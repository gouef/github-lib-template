name: Run tests and upload coverage

on:
  workflow_call: # Trigger pro reusable workflow
    inputs:
      branch:
        required: false
        type: string
        default: "main"
      slug:
        required: false
        type: string
        default: ${{ github.repository }}
      token:
        required: true
        type: string

jobs:
  test:
    name: Run tests and collect coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.4

      - name: Install dependencies
        run: go mod tidy

      - name: Run tests
        run: go test -covermode=set ./... -coverprofile=coverage.txt

      - name: Check coverage file
        run: cat coverage.txt
      - name: Debug info
        run: |
          echo "Repo: ${{ github.repository }}"
      - name: Test if CODECOV_TOKEN is available
        run: |
          if [ -z "${{ inputs.token }}" ]; then
            echo "CODECOV_TOKEN is NOT set"
          else
            echo "CODECOV_TOKEN is available"
          fi
      - name: Debug Codecov Token
        run: |
          echo "Codecov Token: ${{ inputs.token }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODECOV_TOKEN: ${{ inputs.token }}
      - name: Debug Codecov Upload
        run: bash <(curl -s https://codecov.io/bash) -t ${{ inputs.token }} -f coverage.txt -r github.com/${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODECOV_TOKEN: ${{ inputs.token }}

      - name: Upload results to Codecov
        uses: codecov/codecov-action@v5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODECOV_TOKEN: ${{ inputs.token }}
        with:
          token: ${{ inputs.token }}
          files: coverage.txt
          name: ${{ github.workflow }}
          fail_ci_if_error: true
          verbose: true